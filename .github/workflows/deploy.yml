name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd user-service && mvn clean package -DskipTests && cd ..
          cd msg-service && mvn clean package -DskipTests && cd ..
          cd log-service && mvn clean package -DskipTests && cd ..
          cd topbiz-service && mvn clean package -DskipTests && cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            user-service/target/*.jar
            msg-service/target/*.jar
            log-service/target/*.jar
            topbiz-service/target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: jars

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/final
            git pull origin main
            docker compose down
            docker compose build
            docker compose up -d
