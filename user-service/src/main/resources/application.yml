server:
  port: 18081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/zx?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ltm
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# MyBatis-Plus
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Shiro
shiro:
  enabled: true
  sessionManager:
    sessionIdUrlRewritingEnabled: false
  web:
    enabled: true

# SpringDoc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.example.userservice: DEBUG
    org.apache.shiro: INFO

third-party:
  oauth:
    qq:
      client-id: demo-qq-app-id
    wechat:
      app-id: demo-wechat-app-id
    feishu:
      app-id: cli_aacc2ed222785bdb
      app-secret: ${FEISHU_APP_SECRET:}
